name: Parallel Multi-Layer Scraper Loop

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  parallel-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install requests beautifulsoup4 huggingface_hub

      - name: Run Multi-Processing Engine
        env:
          TARGET_URL: "https://archive.org"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scraper.py

      - name: Instant Self Dispatches Restart Trigger
        if: always()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://github.com{{ github.repository }}/actions/workflows/scraper.yml/dispatches \
            -d '{"ref":"main"}'
