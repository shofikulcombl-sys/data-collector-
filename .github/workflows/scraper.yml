name: Advance Autonomous Transactional Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # ব্যাকআপ ট্রিগার

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with: { python-version: '3.9' }

      - name: Install Critical Dependencies
        run: pip install requests beautifulsoup4 huggingface_hub lxml

      - name: Execute Fail-Safe Scraper Pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
        run: python scraper.py

      - name: Safe Push Metadata Log
        if: always() # স্ক্রিপ্ট ফেইল করলেও যেন রোলব্যাক করা মেটাডেটা পুশ হয়
        run: |
          git config --global user.name "Autonomous-Scraper-Bot"
          git config --global user.email "scraper-bot@github.com"
          git add metadata_log.txt
          git commit -m "Sync Metadata Log [skip ci]" || echo "No changes"
          git push

      - name: Trigger Next Cycle Immediately (Auto-Restart)
        if: success() # এই রানটি সফল হলে পরের রানটি স্বয়ংক্রিয়ভাবে ট্রিগার করবে
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
