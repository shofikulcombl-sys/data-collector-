name: Advance Autonomous Transactional Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *' # প্রতি ১০ মিনিট পর পর পাহারাদারের মতো চেক করবে কোনো রান বন্ধ আছে কি না

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # সম্পূর্ণ গিট হিস্ট্রি নেওয়ার জন্য যাতে পুশ রিজেক্ট না হয়

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with: { python-version: '3.9' }

      - name: Install Critical Dependencies
        run: pip install requests beautifulsoup4 huggingface_hub lxml

      - name: Configure Git Bot Security
        run: |
          git config --global user.name "Autonomous-Scraper-Bot"
          git config --global user.email "scraper-bot@github.com"
          git config --global pull.rebase true # কনফ্লিক্ট এড়ানোর জন্য সেফটি নেট

      - name: Execute Fail-Safe Scraper Pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
        run: python scraper.py
