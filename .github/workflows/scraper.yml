name: Continuous 100MB Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় একবার ট্রিপল রান নিশ্চিত করতে

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # সর্বোচ্চ ৬ ঘণ্টা চলবে
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: { python-version: '3.9' }
      - run: pip install requests beautifulsoup4 huggingface_hub lxml
      
      - name: Run Persistent Scraper
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scraper.py
